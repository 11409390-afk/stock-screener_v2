name: Update Taiwan Stocks Data

on:
  schedule:
    - cron: '0 10 * * *' # Runs at 10:00 UTC (18:00 Taiwan time) daily
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Fetch Script
        run: python fetch_tw_stocks.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Taiwan stock list"
          file_pattern: "tw_stocks.json"